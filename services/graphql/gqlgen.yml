schema:
  - graph/*.graphqls
exec:
  filename: graph/generated.go
  package: graph
model:
  filename: graph/model/models_gen.go
  package: model
resolver:
  filename: graph/resolver.go
  package: graph
  type: Resolver
autobind:
  - "graphql-service/graph/model"
models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Task:
    model: graphql-service/graph/model.Task
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tasks_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tls-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - tls-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  auth:
    build:
      context: ../../
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    environment:
      - AUTH_HTTP_PORT=8081
      - AUTH_GRPC_PORT=50051
      - APP_ENV=production
      - LOG_LEVEL=info
    ports:
      - "8081:8081"
      - "50051:50051"
    networks:
      - tls-network
    restart: unless-stopped

  # ============================================
  # GRAPHQL СЕРВИС (НОВЫЙ)
  # ============================================
  graphql:
    build:
      context: ../../
      dockerfile: services/graphql/Dockerfile
    container_name: graphql-service
    environment:
      - GRAPHQL_PORT=8090
      - DB_URL=postgres://postgres:postgres@postgres:5432/tasks_db?sslmode=disable
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tls-network
    restart: unless-stopped

  # ============================================
  # РЕПЛИКИ TASKS ДЛЯ ГОРИЗОНТАЛЬНОГО МАСШТАБИРОВАНИЯ
  # ============================================

  tasks_1:
    build:
      context: ../../
      dockerfile: services/tasks/Dockerfile
    container_name: tasks_1
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_URL=postgres://postgres:postgres@postgres:5432/tasks_db?sslmode=disable
      - APP_ENV=production
      - LOG_LEVEL=info
      - INSTANCE_ID=tasks-1
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - tls-network
    restart: unless-stopped

  tasks_2:
    build:
      context: ../../
      dockerfile: services/tasks/Dockerfile
    container_name: tasks_2
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_URL=postgres://postgres:postgres@postgres:5432/tasks_db?sslmode=disable
      - APP_ENV=production
      - LOG_LEVEL=info
      - INSTANCE_ID=tasks-2
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - tls-network
    restart: unless-stopped

  tasks_3:
    build:
      context: ../../
      dockerfile: services/tasks/Dockerfile
    container_name: tasks_3
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_URL=postgres://postgres:postgres@postgres:5432/tasks_db?sslmode=disable
      - APP_ENV=production
      - LOG_LEVEL=info
      - INSTANCE_ID=tasks-3
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - tls-network
    restart: unless-stopped

  # ============================================
  # NGINX LOAD BALANCER
  # ============================================

  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "8080:8080"   
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tasks_1
      - tasks_2
      - tasks_3
    networks:
      - tls-network
    restart: unless-stopped

  # ============================================
  # NGINX HTTPS PROXY
  # ============================================

  nginx-https:
    image: nginx:alpine
    container_name: nginx-https
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro
    depends_on:
      - nginx-lb
      - auth
    networks:
      - tls-network
    restart: unless-stopped

networks:
  tls-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: